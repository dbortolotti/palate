name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall -q palate tests

      - name: Test
        env:
          PALATE_AUTH_ENABLED: "0"
          PALATE_BACKUP_ENABLED: "0"
          PALATE_DB_PATH: ./.ci/palate.sqlite
        run: python -m unittest discover -s tests
